services:
  - type: web
    name: ai-mastering-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Standard (2GB RAM) -- the DSP chain's baseline footprint (numpy/scipy/
    # pedalboard imports) alone is ~330MB, leaving too little headroom on
    # the 512MB free/starter tiers for anything but very short clips.
    plan: standard
    healthCheckPath: /api/health
    envVars:
      # Public URL of the frontend service, used to allow it through CORS.
      - key: FRONTEND_ORIGIN
        value: https://ai-mastering-frontend.onrender.com

  - type: web
    name: ai-mastering-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      # Public URL of the backend service, baked into the frontend at build
      # time (it got a "-iifp" suffix from Render since the plain name was
      # unavailable -- confirmed via the deployed backend's health check).
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://ai-mastering-backend-iifp.onrender.com
