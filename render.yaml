services:
  - type: web
    name: ai-mastering-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Public URL of the frontend service, used to allow it through CORS.
      # Update this to match the frontend's actual onrender.com URL shown
      # in the Render dashboard after first deploy, if it differs.
      - key: FRONTEND_ORIGIN
        value: https://ai-mastering-frontend.onrender.com

  - type: web
    name: ai-mastering-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      # Public URL of the backend service, baked into the frontend at build
      # time. Update this to match the backend's actual onrender.com URL
      # shown in the Render dashboard after first deploy, if it differs,
      # then trigger a manual redeploy (rebuild) of this service.
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://ai-mastering-backend.onrender.com
